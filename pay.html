<!DOCTYPE html>
<html>
<head>
  <title> - Payment</title>
</head>
<body>
  <h1>💰 Unlock Premium Tips</h1>
  <h3>Pay via MTN Mobile Money</h3>
  <p><b>Number:</b> 0541799703</p>
  <p><b>Name:</b> Alfred Addo</p>
  <p><b>Network:</b> MTN Ghana</p>
  <p><b>Amount:</b> 10 GHS</p>
  <hr>
  <h3>📩 Submit Payment Details</h3>
  <form id="paymentForm">
<label>Full Name</label><br>
<input type="text" id="name" required><br><br>
<label>Phone Number</label><br>
<input type="text" id="phone" required><br><br>
<label>Transaction ID</label><br>
<input type="text" id="tx" required><br><br>
<button type="submit">Submit Payment</button>
  </form>
  <p><i>Access will be granted manually after verification.</i></p>
  <script>
    // 🔐 TELEGRAM BOT SETTINGS (REPLACE THESE)
    const botToken = "YOUR_BOT_TOKEN_HERE";
    const chatId = "YOUR_CHAT_ID_HERE";
    document.getElementById("paymentForm").addEventListener("submit", function(e){
      e.preventDefault();
      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let tx = document.getElementById("tx").value;
      let message =
        "💰 NEW PAYMENT ALERT\n\n" +
        "👤 Name: " + name + "\n" +
        "📞 Phone: " + phone + "\n" +
        "🧾 Transaction ID: " + tx;
      fetch("https://api.telegram.org/bot" + botToken + "/sendMessage", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: chatId,
          text: message
        })
      });
      alert("Payment submitted successfully. Wait for approval.");
      document.getElementById("paymentForm").reset();
    });
  </script>
</body>
</html>
