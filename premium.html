  <p><b>Number:</b> 0541799703</p>

<div id="accessSection" style="display:none;">

  <ul>
    <li>Correct Score: 2-1 Home Win</li>
    <li>BTTS: YES</li>

<script>
// Generate random access code
function generateCode() {
  return "GM-" + Math.floor(Math.random() * 999999);
}
function activateAccess() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let tx = document.getElementById("tx").value;
  if (!name || !phone || !tx) {
    alert("Please fill all fields");
    return;
  }
  // AUTO ACCESS (NO APPROVAL)
  let code = generateCode();
  // Save access locally
  localStorage.setItem("premiumAccess", code);
  alert("Payment received! Your Access Code: " + code);
  document.getElementById("paymentSection").style.display = "none";
  document.getElementById("accessSection").style.display = "block";
}
// Auto-check if user already has access
window.onload = function() {
  let saved = localStorage.getItem("premiumAccess");
  if (saved) {
    document.getElementById("paymentSection").style.display = "none";
    document.getElementById("accessSection").style.display = "block";
  }
}
</script>
